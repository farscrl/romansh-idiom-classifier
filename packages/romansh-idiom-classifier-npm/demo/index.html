<!DOCTYPE html>
<html lang="rm">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romansh Idiom Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #1a4f8a; }
    header p  { margin-top: .4rem; color: #666; font-size: .95rem; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 1.8rem;
      width: 100%;
      max-width: 640px;
    }

    textarea {
      width: 100%;
      height: 130px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: .75rem;
      font-size: 1rem;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: #1a4f8a; }

    #result {
      margin-top: 1.5rem;
    }

    .prediction {
      display: flex;
      align-items: baseline;
      gap: .6rem;
      margin-bottom: 1.2rem;
    }
    .prediction .label { font-size: .8rem; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .prediction .idiom { font-size: 1.6rem; font-weight: 700; color: #1a4f8a; }
    .prediction .code  { font-size: .85rem; color: #999; font-family: monospace; }

    .scores { display: flex; flex-direction: column; gap: .45rem; }

    .score-row {
      display: grid;
      grid-template-columns: 110px 1fr 50px;
      align-items: center;
      gap: .5rem;
    }
    .score-row .name { font-size: .88rem; color: #444; }
    .score-row .bar-wrap {
      height: 10px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
    }
    .score-row .bar {
      height: 100%;
      background: #1a4f8a;
      border-radius: 5px;
      transition: width .2s ease;
    }
    .score-row.winner .bar { background: #1a8a4f; }
    .score-row .pct { font-size: .8rem; color: #666; text-align: right; }

    .placeholder { color: #bbb; font-size: .95rem; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>

<header>
  <h1>Romansh Idiom Classifier</h1>
  <p>Scriver u encollar in text en rumantsch per identifitgar l'idiom.</p>
</header>

<div class="card">
  <textarea id="input" placeholder="Endatar il text rumantsch..." spellcheck="false"></textarea>
<div id="result"><div class="placeholder">Cumenza a tippar per vesair il resultat.</div></div>
</div>

<script type="module">
  import { RomanshIdiomClassifier } from "../src/index.ts";

  const IDIOM_NAMES = {
    "rm-sursilv":  "Sursilvan",
    "rm-sutsilv":  "Sutsilvan",
    "rm-surmiran": "Surmiran",
    "rm-puter":    "Puter",
    "rm-vallader": "Vallader",
    "rm-rumgr":    "Rumantsch Grischun",
    "de":          "Deutsch",
    "fr":          "Français",
    "it":          "Italiano",
    "en":          "English",
  };

  const inputEl  = document.getElementById("input");
  const resultEl = document.getElementById("result");

  function render(text) {
    if (!text.trim()) {
      resultEl.innerHTML = '<div class="placeholder">Cumenza a tippar per vesair il resultat.</div>';
      return;
    }
    const probs   = classifier.softScores(text);
    const winner  = Object.entries(probs).sort(([, a], [, b]) => b - a)[0][0];
    const ordered = Object.keys(probs).sort((a, b) => probs[b] - probs[a]);

    const bars = ordered.map(key => {
      const pct   = (probs[key] * 100).toFixed(1);
      const isWin = key === winner;
      return `
        <div class="score-row ${isWin ? "winner" : ""}">
          <span class="name">${IDIOM_NAMES[key]}</span>
          <div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div>
          <span class="pct">${pct}%</span>
        </div>`;
    }).join("");

    resultEl.innerHTML = `
      <div class="prediction">
        <span class="label">Identifitgà</span>
        <span class="idiom">${IDIOM_NAMES[winner]}</span>
        <span class="code">${winner}</span>
      </div>
      <div class="scores">${bars}</div>`;
  }

  let classifier = null;
  let debounce;

  inputEl.addEventListener("input", () => {
    clearTimeout(debounce);
    if (!classifier) return;
    debounce = setTimeout(() => render(inputEl.value), 150);
  });

  try {
    classifier = new RomanshIdiomClassifier();
    if (inputEl.value.trim()) render(inputEl.value);
  } catch (e) {
    resultEl.innerHTML = `<div class="placeholder">Errur cun chargiar il model: ${e.message}</div>`;
  }
</script>

</body>
</html>
