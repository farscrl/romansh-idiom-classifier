[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "romansh-idiom-classifier"
version = "1.0.1"
description = "Romansh idiom classifier — Sursilvan, Sutsilvan, Surmiran, Puter, Vallader, Rumantsch Grischun, German, French, Italian, English"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24"]
keywords = ["romansh", "rumantsch", "language-identification", "nlp"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Linguistic",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
]

[[project.authors]]
name = "far ScRL"

[project.urls]
Homepage = "https://github.com/farscrl/romansh-idiom-classifier"
Repository = "https://github.com/farscrl/romansh-idiom-classifier"

[tool.hatch.build]
artifacts = [
    "src/romansh_idiom_classifier/models/*.json",
]

[tool.hatch.build.targets.sdist]
exclude = ["scripts/"]

[tool.hatch.build.targets.wheel]
packages = ["src/romansh_idiom_classifier"]

[tool.hatch.build.targets.wheel.shared-data]
