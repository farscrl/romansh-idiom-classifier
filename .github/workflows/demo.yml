name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "packages/romansh-idiom-classifier-npm/**"
      - "models/lr_lite_export.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: packages/romansh-idiom-classifier-npm/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages/romansh-idiom-classifier-npm
        run: pnpm install

      - name: Build demo
        working-directory: packages/romansh-idiom-classifier-npm
        run: pnpm build:demo

      - uses: actions/upload-pages-artifact@v5
        with:
          path: packages/romansh-idiom-classifier-npm/demo-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
